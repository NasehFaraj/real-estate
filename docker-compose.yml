services:
    mongo:
        image: mongo:6
        container_name: realestate-mongo
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
        volumes:
            - mongo_data:/data/db
        read_only: false
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        healthcheck:
            test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - app_net

    api:
        build: .
        container_name: realestate-api
        depends_on:
            mongo:
                condition: service_healthy
        user: "10001:10001"
        ports:
            - '${PORT:-3000}:3000'
        env_file:
            - .env
        environment:
            NODE_ENV: production
            MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DB_NAME}?authSource=admin
        read_only: true
        tmpfs:
            - /tmp
            - /app/tmp
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        pids_limit: 200
        volumes:
            - api_logs:/app/logs
        restart: unless-stopped
        healthcheck:
            test:
                [
                    'CMD',
                    'node',
                    '-e',
                    "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - app_net

volumes:
    mongo_data:
    api_logs:

networks:
    app_net:
        driver: bridge
